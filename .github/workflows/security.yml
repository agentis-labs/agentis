name: Security

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]
  schedule:
    # Weekly re-scan so newly-disclosed advisories against pinned deps surface
    # even without a code change.
    - cron: '0 6 * * 1'

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  invariants:
    name: security invariants + secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # gitleaks scans full history

      # Enforce the code-level security invariants (SSRF pin, env redaction,
      # redirect re-validation) — regressions fail the build.
      - name: Security invariants
        run: node scripts/check-security-invariants.mjs

      # Fail on committed secrets (keys, tokens, .env values).
      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: 8.30.1
        run: |
          set -euo pipefail
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Secret scan (gitleaks)
        run: gitleaks detect --source . --no-banner --redact --exit-code 1

  audit:
    name: dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Fail the build on high/critical known vulnerabilities in the dep tree.
      - name: pnpm audit
        run: pnpm audit --audit-level=high

  codeql:
    name: CodeQL (javascript-typescript)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/autobuild@v3
      - uses: github/codeql-action/analyze@v3
