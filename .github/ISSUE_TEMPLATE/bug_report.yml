name: Bug Report
description: Report something that is broken or surprising.
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to report a bug.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Steps, commands, or a minimal example that reproduces the issue.
      placeholder: |
        1. Run ...
        2. Open ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Agentis Version or Commit
      placeholder: v0.1.x or commit SHA
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Node.js version, pnpm version, database mode, and relevant runtime adapters.
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste relevant logs with secrets removed.
      render: text
