# Agentis - one-liner local runtime.
# `docker compose up` boots a single container with a persistent volume
# for the SQLite database, vault keys, and JWT keypair.
services:
  agentis:
    build: .
    image: agentis:latest
    ports:
      - "3737:3737"
    volumes:
      - agentis_data:/data
    environment:
      AGENTIS_DATA_DIR: /data
      AGENTIS_HTTP_HOST: 0.0.0.0
      AGENTIS_HTTP_PORT: "3737"
    restart: unless-stopped

volumes:
  agentis_data:
