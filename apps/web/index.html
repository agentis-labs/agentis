<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%230a0a0b'/><g fill='none' stroke='%23fafafa' stroke-width='5' stroke-linejoin='miter' stroke-linecap='square'><path d='M46 13 L17 33 L17 67 L46 87 L46 13 Z'/><path d='M46 50 L28 50'/><path d='M54 13 L83 33 L83 67 L54 87 L54 13 Z'/><path d='M54 50 L72 50'/></g></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agentis</title>
    <script>
      (function () {
        var key = 'agentis.theme';
        var stored = 'dark';
        try {
          var raw = localStorage.getItem(key);
          if (raw === 'light' || raw === 'dark' || raw === 'system') stored = raw;
        } catch {}
        var effective = stored === 'system'
          ? (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark')
          : stored;
        var root = document.documentElement;
        root.setAttribute('data-theme', effective);
        root.classList.remove('dark', 'light');
        root.classList.add(effective);
        root.style.colorScheme = effective;
      })();
    </script>
  </head>
  <body class="bg-canvas text-text-primary font-sans antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
