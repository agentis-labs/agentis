<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/brand/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agentis</title>
    <!-- §PERF-BOOT — non-blocking font load (moved out of styles.css, where an
         @import render-blocked every paint and stalled offline installs).
         media="print" defers evaluation; onload swaps it live. Text paints
         immediately in the system fallback stack and upgrades to Inter. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      />
    </noscript>
    <script>
      (function () {
        var key = 'agentis.theme';
        var stored = 'dark';
        try {
          var raw = localStorage.getItem(key);
          if (raw === 'light' || raw === 'dark' || raw === 'system') stored = raw;
        } catch {}
        var effective = stored === 'system'
          ? (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark')
          : stored;
        var root = document.documentElement;
        root.setAttribute('data-theme', effective);
        root.classList.remove('dark', 'light');
        root.classList.add(effective);
        root.style.colorScheme = effective;
      })();
    </script>
  </head>
  <body class="bg-canvas text-text-primary font-sans antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
